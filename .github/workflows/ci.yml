name: CI

# This file MUST live in the repository root. GitHub Actions only reads
# .github/workflows/ at the root, so while it lived in aegis-app/.github/ it
# never ran once — the only workflow GitHub ever executed here was gitleaks.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    # The bun workspace root is one level down; every `run` step starts there so
    # bun finds package.json / bun.lock, and `docker build` gets aegis-app as its
    # context (which is what backend/Dockerfile and fly.toml expect).
    working-directory: aegis-app

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A pull_request checkout is detached at the merge commit. Two guards in
      # scripts/prepare-do-specs.mjs read the ambient git state, and test:deploy
      # exercises them: from a detached HEAD the "named release branch" guard
      # fires before the branch-mismatch one the test targets, so the test sees
      # the wrong message and fails.
      #
      # Naming the branch keeps the merge-commit semantics AND lets the test
      # reach the guard it asserts on. Nothing is relaxed — both guards still
      # run, and a real deploy checkout is on a named branch anyway.
      #
      # Follow-up: the test asserts on ambient git state, which is the actual
      # defect. gitOutput() in that script is hardcoded to cwd: repoRoot, so the
      # test cannot point it at a scratch repository without changing the script.
      - name: Name the checkout for the release git-check
        run: git switch --force-create ci-release-source

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          # hashFiles paths are relative to the repository root, not to
          # defaults.run.working-directory.
          key: ${{ runner.os }}-bun-${{ hashFiles('aegis-app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Architecture boundaries
        run: bun run architecture:check

      - name: Webapp lint
        run: bun run --cwd webapp lint

      - name: Deployment and script tests
        run: bun run test:deploy

      - name: Contract tests
        run: bun run test:contracts

      - name: Webapp client tests
        run: bun run test:webapp

      # Unit tests + the auth integration test, which brings up the
      # docker-compose Postgres itself. Docker is preinstalled on ubuntu-latest.
      - name: Backend tests
        run: bun run test:backend

      # Boots a throwaway embedded PostgreSQL 17.6 (the production version),
      # applies every migration and runs the repository integration tests against
      # it. No Docker and no secrets: the binary ships as a devDependency.
      - name: Backend repository tests on a real PostgreSQL
        run: bun run --cwd backend test:pg:local

      # Re-enabled. It was disabled because the container boots NODE_ENV=production
      # and the env gate demanded a bot token, a webhook secret and a TLS
      # DATABASE_URL, none of which CI can or should have. Two changes fixed that
      # without relaxing the gate: DATABASE_URL now passes because the compose
      # Postgres is a private host (a public host without TLS is still rejected),
      # and docker-smoke.mjs supplies throwaway Telegram values that never reach
      # Telegram — the smoke only probes /health and the auth API.
      - name: Backend Docker smoke
        run: bun run smoke:backend:docker

      # Parses deploy/compose.prod.yml and asserts the invariants whose absence is
      # silent: a published database port, an internal network that lost
      # `internal: true`, the postgres:18 volume layout under a 17 server. Then,
      # since Docker is present on ubuntu-latest, it also runs the real
      # `docker compose config` for syntax + interpolation. Both live in one
      # script so `bun run test:deploy` gets the same coverage locally.
      - name: Production compose invariants
        run: bun scripts/compose-check.mjs

      - name: Install Playwright browser
        run: bun run --cwd webapp e2e:install

      # playwright.config.ts pins NODE_ENV=test, so the backend under test does
      # not trip the production env gate; global-setup brings up its own Postgres.
      - name: Webapp E2E smoke
        run: bun run e2e:webapp
